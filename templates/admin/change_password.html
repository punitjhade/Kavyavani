{% extends "admin/base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="adm-h"><h1>🔑 Change Password</h1></div>
<div style="background:var(--ink2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;max-width:380px">
  <form method="post" action="{{ url_for('admin_change_password') }}">
    <div class="fg"><label>Current Password</label><input type="password" name="current" required/></div>
    <div class="fg"><label>New Password</label><input type="password" name="new_pass" required/></div>
    <div class="fg"><label>Confirm New</label><input type="password" name="confirm" required/></div>
    <button type="submit" class="btn btn-primary">✅ Update</button>
  </form>
</div>{% endblock %}
